<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — CRS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --white: #ffffff;
    --border: #e0e2e7;
    --text: #111827;
    --muted: #6b7280;
    --hint: #9ca3af;
    --blue: #185fa5;
    --blue-light: #e6f1fb;
    --blue-mid: #378add;
    --input-bg: #f9fafb;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
  }

  .top {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-wrap {
    width: 48px;
    height: 48px;
    background: var(--blue-light);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }

  .logo-wrap svg { width: 24px; height: 24px; fill: var(--blue); }

  h1 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted); }

  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; }

  input {
    width: 100%;
    background: var(--input-bg);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  input:focus { border-color: var(--blue-mid); background: var(--white); }
  input::placeholder { color: var(--hint); }

  .btn {
    width: 100%;
    background: var(--blue);
    border: none;
    border-radius: 8px;
    padding: 11px;
    color: var(--blue-light);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s;
  }

  .btn:hover { background: #0c4479; }
  .btn:active { transform: scale(0.99); }

  .error {
    background: #fef2f2;
    border: 0.5px solid #fecaca;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: #b91c1c;
    margin-bottom: 1rem;
    display: none;
  }

  .divider { height: 0.5px; background: var(--border); margin: 1.5rem 0; }

  .footer { font-size: 11px; color: var(--hint); text-align: center; line-height: 1.5; }

  .loading { opacity: 0.7; pointer-events: none; }
</style>
</head>
<body>

<div class="card">
  <div class="top">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h7" stroke="#185fa5" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    </div>
    <h1>Classroom Reservation</h1>
    <p class="sub">Sign in to your account</p>
  </div>

  <div class="error" id="error-msg"></div>

  <form id="login-form">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="e.g. raheela.asif" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="submit-btn">Sign in</button>
  </form>

  <div class="divider"></div>
  <p class="footer">Department of Computer Science & IT<br>Spring Semester 2026</p>
</div>

<script>
  const API = 'http://localhost:4000/api';

  const form = document.getElementById('login-form');
  const errorMsg = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  if (localStorage.getItem('token')) {
    window.location.href = 'home.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.textContent = 'Signing in...';
    submitBtn.classList.add('loading');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Login failed';
        errorMsg.style.display = 'block';
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('staff_id', data.staff_id);
      localStorage.setItem('role', data.role);
      localStorage.setItem('name', data.name);

      window.location.href = 'home.html';

    } catch (err) {
      errorMsg.textContent = 'Cannot connect to server. Make sure the backend is running.';
      errorMsg.style.display = 'block';
    } finally {
      submitBtn.textContent = 'Sign in';
      submitBtn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
